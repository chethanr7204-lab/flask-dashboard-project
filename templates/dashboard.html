<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="navbar">
    My App Dashboard
</div>

<div class="main">

    <div class="sidebar">
        <a href="#">Home</a>
        <a href="#">Profile</a>
        <a href="#">Settings</a>
        <a href="/logout">Logout</a>
    </div>

    <div class="content">
        <h2>Welcome {{ user }}</h2>

        <div class="cards">
            <div class="card">
                <h3>Users</h3>
                <p>120</p>
            </div>

            <div class="card">
                <h3>Revenue</h3>
                <p>$5000</p>
            </div>

            <div class="card">
                <h3>Tasks</h3>
                <p>32</p>
            </div>
        </div>
    </div>

</div>

</body>
</html>
